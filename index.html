<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBM Internship Tracker</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container">
            <p class="eyebrow">IBM Internship</p>
            <h1>Rohan's Internship Tracker</h1>
            <p class="subtitle">A week-by-week log of progress, projects, and learning across the 9-week program.</p>
            <nav class="view-nav">
                <button class="view-btn active" data-view="timeline">Timeline</button>
                <button class="view-btn" data-view="presentation">Presentation</button>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="view" id="timeline-view">
            <div id="mcw-spotlight"></div>
            <div class="timeline" id="timeline">
                <!-- Week posts will be generated here -->
            </div>
        </div>

        <div class="view hidden" id="presentation-view">
            <div class="deck" id="deck">
                <div class="slide-stage" id="slide-stage"></div>
                <div class="deck-controls">
                    <button class="deck-btn" id="deck-prev" aria-label="Previous slide">&larr;</button>
                    <div class="deck-dots" id="deck-dots"></div>
                    <button class="deck-btn" id="deck-next" aria-label="Next slide">&rarr;</button>
                </div>
            </div>
        </div>
    </main>

    <div id="modal" class="modal hidden">
        <div class="modal-backdrop" id="modal-backdrop"></div>
        <div class="modal-content">
            <button class="modal-close" id="modal-close">&times;</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="data/internshipData.js"></script>
    <script src="script.js"></script>
</body>
</html>
